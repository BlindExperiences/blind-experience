<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bk:#080808;--wh:#f8f5f0;--gold:#c9a96e}
html,body{background:var(--bk);color:var(--wh);font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased}
.ui{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(8,8,8,.96),transparent);pointer-events:none}
.ui-brand{display:flex;align-items:center;gap:.5rem;pointer-events:all}
.ui-brand img{width:22px;height:22px;opacity:.6}
.ui-brand span{font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(248,245,240,.4)}.ui-brand b{font-weight:600;color:rgba(248,245,240,.6)}
.ui-actions{display:flex;gap:.7rem;pointer-events:all}
.ubtn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.3rem;font-family:'Montserrat',sans-serif;font-size:.55rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:all .3s;border:none;outline:none}
.ubtn.dl{background:var(--wh);color:var(--bk)}.ubtn.dl:hover{background:var(--gold);color:#fff}
.ubtn.sh{background:transparent;border:1px solid rgba(248,245,240,.18);color:rgba(248,245,240,.55)}.ubtn.sh:hover{border-color:var(--wh);color:var(--wh)}
.ubtn.busy{opacity:.4;pointer-events:none}
.spanel{position:fixed;bottom:0;left:0;right:0;z-index:201;padding:1.8rem 2rem 2.2rem;background:rgba(8,8,8,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(248,245,240,.08);transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.spanel.open{transform:translateY(0)}
.sp-title{font-size:.52rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(248,245,240,.35);margin-bottom:1.2rem}
.sp-btns{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:1rem}
.sp-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.4rem;border:1px solid rgba(248,245,240,.14);color:rgba(248,245,240,.5);font-family:'Montserrat',sans-serif;font-size:.58rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;background:0 0;cursor:pointer;transition:all .25s}
.sp-btn:hover{color:var(--wh);border-color:var(--wh)}.sp-btn.fb:hover{border-color:#1877f2;color:#1877f2}.sp-btn.li:hover{border-color:#0a66c2;color:#0a66c2}.sp-btn.ig:hover{border-color:#e1306c;color:#e1306c}
.sp-msg{font-size:.62rem;color:rgba(248,245,240,.28);font-style:italic;line-height:1.5}
.sp-close{position:absolute;top:1.2rem;right:1.8rem;background:0 0;border:none;color:rgba(248,245,240,.3);font-size:1.4rem;cursor:pointer;line-height:1}.sp-close:hover{color:var(--wh)}
#slides{display:flex;flex-direction:column}
/* Slide: 16:9 */
.sl{position:relative;width:100%;padding-bottom:56.25%;overflow:hidden;background:#080808;flex-shrink:0}
.sli{position:absolute;inset:0;overflow:hidden}
/* ALL images inside slides */
.im{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
/* Cover */
.cover-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;padding:2.5rem 4.5rem;background:rgba(8,8,8,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(248,245,240,.1);min-width:320px;max-width:78%}
.cover-ey{font-size:.48rem;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);font-weight:400;margin-bottom:1rem}
.cover-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,3.2rem);font-weight:300;font-style:italic;line-height:1.1;margin-bottom:.6rem;color:var(--wh)}
.cover-desc{font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(248,245,240,.4);font-weight:300}
.cover-logo{position:absolute;bottom:1.4rem;left:1.8rem;display:flex;align-items:center;gap:.5rem;z-index:3}
.cover-logo img{width:22px;height:22px;opacity:.65}
.cover-logo span{font-size:.45rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(248,245,240,.38)}.cover-logo b{font-weight:600}
.vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,.72) 100%);z-index:1}
/* Grids — all with explicit height:100% */
.g2{display:grid;grid-template-columns:60% 40%;height:100%;gap:2px}
.g2r{display:grid;grid-template-rows:1fr 1fr;height:100%;gap:2px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;height:100%;gap:2px}
.g4{display:grid;grid-template-rows:60% 40%;height:100%;gap:2px}
.g4b{display:grid;grid-template-columns:1fr 1fr;height:100%;gap:2px}
.g5{display:grid;grid-template-columns:40% 60%;height:100%;gap:2px}
.g5l{display:grid;grid-template-rows:1fr 1fr;height:100%;gap:2px}
/* Grid cell — must have position:relative for .im to anchor correctly */
.gc{position:relative;overflow:hidden;background:#111;min-height:0;min-width:0}
/* Quote */
.qo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;padding:2rem 3.2rem;background:rgba(8,8,8,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-left:3px solid var(--gold);max-width:55%;pointer-events:none;width:max-content}
.qo blockquote{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,2vw,1.6rem);font-style:italic;font-weight:300;line-height:1.65;color:rgba(248,245,240,.94)}
.qo cite{display:block;margin-top:.8rem;font-family:'Montserrat',sans-serif;font-size:.65rem;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-style:normal;font-weight:400}
/* Closing */
.closing-hero{filter:brightness(.12) saturate(.7)}
.closing-inner{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem}
.closing-h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,3.2vw,2.5rem);font-weight:300;font-style:italic;line-height:1.35;color:#fff;max-width:540px;margin-bottom:.7rem}
.closing-sub{font-size:.68rem;font-weight:300;color:rgba(248,245,240,.55);letter-spacing:.1em;margin-bottom:.7rem;line-height:1.7}
.closing-url{font-size:.45rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(248,245,240,.25);margin-bottom:2.5rem}
.closing-brand{display:flex;align-items:center;justify-content:center;gap:.7rem}
.closing-brand img{width:38px;height:38px;opacity:.8}
.closing-bt{font-size:.75rem;letter-spacing:.28em;text-transform:uppercase;font-weight:300;color:rgba(248,245,240,.8)}.closing-bt b{font-weight:600}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--wh);color:var(--bk);font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.15em;padding:.75rem 2rem;z-index:300;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:768px){.ui{padding:1rem}.ubtn{padding:.5rem .9rem;font-size:.5rem}.cover-card{padding:1.2rem 1.4rem;min-width:0}.cover-h1{font-size:clamp(1.3rem,6vw,2rem)}.qo{max-width:82%;padding:1.2rem 1.8rem;width:auto}.qo blockquote{font-size:clamp(1rem,3.5vw,1.4rem)}.closing-h2{font-size:clamp(1.2rem,5vw,1.8rem)}.sp-btns{gap:.5rem}.sp-btn{padding:.6rem 1rem;font-size:.55rem}}
</style>

// ── WEIGHTED SELECTION ─────────────────────────────────────
function getWeightedTags(axes){
  if(!axes||!Object.keys(axes).length)return[{tag:'nature',pct:1}];
  var scores={};
  Object.keys(axes).forEach(function(axis){
    var m=AXIS_MAP[axis];if(!m)return;
    var v=Number(axes[axis]);
    scores[m.left]=(scores[m.left]||0)+(100-v);
    scores[m.right]=(scores[m.right]||0)+v;
  });
  var total=Object.values(scores).reduce(function(a,b){return a+b},0)||1;
  var sorted=Object.entries(scores)
    .filter(function(e){return POOLS[e[0]]&&e[1]>0})
    .sort(function(a,b){return b[1]-a[1]})
    .map(function(e){return{tag:e[0],pct:e[1]/total}});
  console.log('[BE] Weighted tags:',sorted.slice(0,5).map(function(t){return t.tag+':'+(t.pct*100).toFixed(0)+'%'}).join(', '));
  return sorted;
}

function pickWeightedImgs(weightedTags,n,travType,heroUrl){
  // Allocate n slots proportionally by weight
  var used={};
  // Exclude hero image from pool to avoid same photo on cover+slides+closing
  if(heroUrl){var hm=heroUrl.match(/\/(photo-[\w-]+)\?/);if(hm)used[hm[1]]=1;}
  // Also block the full URL to catch 900×600 vs 1800×1000 variants
  if(heroUrl){used[heroUrl.replace(/\?.*$/,'')]=1;}
  var slots=[];
  var tag0=weightedTags[0]?weightedTags[0].tag:'nature';

  // First: up to 2 traveller images
  (TRAV[travType]||TRAV.couple).forEach(function(u){
    if(slots.length<2&&!used[u]){used[u]=1;slots.push(u)}
  });

  var remaining=n-slots.length; // typically 10
  // Allocate remaining slots proportionally
  var alloc=[];
  var sum=0;
  weightedTags.forEach(function(wt){sum+=wt.pct});
  weightedTags.forEach(function(wt){
    alloc.push({tag:wt.tag,count:Math.max(1,Math.round((wt.pct/sum)*remaining))});
  });
  // Trim/pad alloc to exactly 'remaining'
  var allocTotal=alloc.reduce(function(a,b){return a+b.count},0);
  while(allocTotal>remaining&&alloc.length>1){alloc[alloc.length-1].count--;allocTotal--}
  while(allocTotal<remaining){alloc[0].count++;allocTotal++}

  // Fill slots by tag allocation
  alloc.forEach(function(a){
    var pool=POOLS[a.tag];if(!pool)return;
    var added=0;
    for(var i=0;i<pool.length&&added<a.count;i++){
      if(!used[pool[i]]){used[pool[i]]=1;slots.push(pool[i]);added++}
    }
    // If pool exhausted, grab from dominant pool
    while(added<a.count){
      var fallback=POOLS[tag0]||POOLS.nature;
      for(var j=0;j<fallback.length&&added<a.count;j++){
        if(!used[fallback[j]]){used[fallback[j]]=1;slots.push(fallback[j]);added++}
      }
      break;
    }
  });

  // Safety: pad with any available pool image if still short
  var allTags=Object.keys(POOLS);
  while(slots.length<n){
    var added=false;
    for(var ki=0;ki<allTags.length&&!added;ki++){
      var fp=POOLS[allTags[ki]];
      for(var k=0;k<fp.length&&!added;k++){
        if(!used[fp[k]]){used[fp[k]]=1;slots.push(fp[k]);added=true}
      }
    }
    if(!added)break; // truly exhausted
  }
  return slots.slice(0,n);
}

function openShare(){document.getElementById('spanel').classList.add('open')}

// Capture cover slide as JPEG blob — shared by all three platforms
async function captureSlide(){
  var slide=document.querySelector('.sl');
  if(!slide)return null;
  // Preload all images in this slide
  var imgs=slide.querySelectorAll('img');
  await Promise.all(Array.from(imgs).map(function(im){
    return im.complete?Promise.resolve():new Promise(function(r){im.onload=r;im.onerror=r});
  }));
  await new Promise(function(r){setTimeout(r,600)});
  var canvas=await html2canvas(slide,{
    useCORS:true,allowTaint:true,scale:2,
    backgroundColor:'#080808',logging:false,imageTimeout:10000
  });
  return new Promise(function(res){canvas.toBlob(res,'image/jpeg',0.92)});
}

function downloadBlob(blob,filename){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href)},1500);
}

function setBtnState(id,txt){
  var b=document.getElementById(id);
  if(b)b.textContent=txt;
}

  closeShare();

  var fbUrl='https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(SHARE_URL)+'&quote='+encodeURIComponent(SHARE_MSG);
  var popup=window.open(fbUrl,'fb-share','width=626,height=436,resizable=yes,scrollbars=yes');
  // If popup was blocked, fall back to new tab
  if(!popup||popup.closed||typeof popup.closed==='undefined'){
    window.open(fbUrl,'_blank');
  }
  try{
    var blob=await captureSlide();
    if(blob){
      downloadBlob(blob,'BlindExperiences-Moodboard.jpg');
      // Also copy message to clipboard so user can paste into FB post
      try{await navigator.clipboard.writeText(SHARE_MSG)}catch(ce){}
      showToast('Image saved — paste it into your Facebook post');
    }
  }catch(e){
    console.error('FB capture:',e);
  }
  setBtnState('fbBtn','Facebook');
}

// 5.3 INSTAGRAM: mobile file share → mobile URL share → desktop download+clipboard
async function doIG(){
  closeShare();
  setBtnState('igBtn','Preparing…');
  try{
    var blob=await captureSlide();
    if(!blob)throw new Error('capture returned null');
    var file=new File([blob],'BlindExperiences-Moodboard.jpg',{type:'image/jpeg'});

    // PATH 1: Mobile native share with file (iOS/Android opens Instagram directly)
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file],title:'My BlindExperiences Moodboard',text:SHARE_MSG,url:SHARE_URL});
        setBtnState('igBtn','Instagram');return;
      }catch(e){if(e.name==='AbortError'){setBtnState('igBtn','Instagram');return}}
    }
    // PATH 2: Mobile URL+text share (no file)
    if(navigator.share){
      try{
        await navigator.share({title:'My BlindExperiences Moodboard',text:SHARE_MSG,url:SHARE_URL});
        setBtnState('igBtn','Instagram');return;
      }catch(e){if(e.name==='AbortError'){setBtnState('igBtn','Instagram');return}}
    }
    // PATH 3: Desktop — download + clipboard
    downloadBlob(blob,'BlindExperiences-Moodboard.jpg');
    var captionCopied=false;
    if(navigator.clipboard){
      try{await navigator.clipboard.writeText(SHARE_MSG);captionCopied=true}catch(ce){}
    }
    showToast(captionCopied
      ?'Image saved + caption copied — open Instagram and share'
      :'Image saved — open Instagram, post the image, and add this caption: '+SHARE_URL);
  }catch(e){
    console.error('IG:',e);
    if(navigator.clipboard){
      try{await navigator.clipboard.writeText(SHARE_MSG);showToast('Caption copied — open Instagram to share')}
      catch(ce){showToast('Screenshot the page and share on Instagram')}
    }else{showToast('Screenshot this page and share on Instagram')}
  }
  setBtnState('igBtn','Instagram');
}

async function dlPDF(){
  var btn=document.getElementById('dlBtn');btn.classList.add('busy');btn.textContent='Generating\u2026';
  var allImgs=document.querySelectorAll('.sl img');
  await Promise.all(Array.from(allImgs).map(function(im){return im.complete?Promise.resolve():new Promise(function(r){im.onload=r;im.onerror=r})}));
  await new Promise(function(r){setTimeout(r,2000)});
  try{
    var jsPDF=window.jspdf.jsPDF;
    var pdf=new jsPDF('l','mm','a4');
    var pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    var slides=document.querySelectorAll('.sl');
    for(var i=0;i<slides.length;i++){
      if(i>0)pdf.addPage();
      pdf.setFillColor(8,8,8);pdf.rect(0,0,pw,ph,'F');
      var canvas=await html2canvas(slides[i],{useCORS:true,allowTaint:true,scale:2,backgroundColor:'#080808',logging:false,imageTimeout:12000});
      var ratio=canvas.width/canvas.height,pr=pw/ph;
      var iw,ih,x,y;
      if(ratio>=pr){iw=pw;ih=pw/ratio;x=0;y=(ph-ih)/2}else{ih=ph;iw=ph*ratio;x=(pw-iw)/2;y=0}
      pdf.addImage(canvas.toDataURL('image/jpeg',.92),'JPEG',x,y,iw,ih);
    }
    pdf.save('BlindExperiences-Moodboard.pdf');
    showToast('PDF saved \u2713');
  }catch(e){console.error(e);showToast('Try: right-click > Print > Save as PDF')}
  btn.classList.remove('busy');btn.textContent='Download PDF';
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3500)}

var cfg=(function(){
  try{var s=localStorage.getItem('blindMoodboard');if(s){var p=JSON.parse(s);if(p&&p.axes&&Object.keys(p.axes).length)return p}}catch(e){}
  return{name:"Your",tripLabel:"Blind Experience",expType:"An Uncharted Journey",travType:"couple",
    axes:{horizon:25,rhythm:30,comfort:25,landscape:25,setting:35,spirit:35,cultural:35}};
})();
render(cfg);
window.initMoodboard=function(c){try{localStorage.setItem('blindMoodboard',JSON.stringify(c))}catch(e){}render(c)};
</script>
