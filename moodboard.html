*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.ui{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.4rem 2rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(8,8,8,.96),transparent);pointer-events:none}
.ui-brand{display:flex;align-items:center;gap:.5rem;pointer-events:all}
.ui-brand img{width:22px;height:22px;opacity:.6}
.ui-brand span{font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(248,245,240,.4)}.ui-brand b{font-weight:600;color:rgba(248,245,240,.6)}
.ui-actions{display:flex;gap:.7rem;pointer-events:all}
.ui-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.3rem;font-family:'Montserrat',sans-serif;font-size:.55rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:all .3s;border:none;outline:none}
.ui-btn.dl{background:var(--wh);color:var(--bk)}.ui-btn.dl:hover{background:var(--gold);color:#fff}
.ui-btn.sh{background:transparent;border:1px solid rgba(248,245,240,.18);color:rgba(248,245,240,.55)}.ui-btn.sh:hover{border-color:var(--wh);color:var(--wh)}
.ui-btn svg{width:12px;height:12px;flex-shrink:0}.ui-btn.dl svg{fill:currentColor}.ui-btn.sh svg{fill:none;stroke:currentColor;stroke-width:2}
.ui-btn.busy{opacity:.4;pointer-events:none}
/* Share panel */
.share-panel{position:fixed;bottom:0;left:0;right:0;z-index:201;padding:1.8rem 2rem;background:rgba(8,8,8,.96);backdrop-filter:blur(16px);border-top:1px solid rgba(248,245,240,.08);transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.share-panel.open{transform:translateY(0)}
.sp-title{font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(248,245,240,.4);margin-bottom:1.2rem}
.sp-btns{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:1rem}
.sp-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.4rem;border:1px solid rgba(248,245,240,.15);color:rgba(248,245,240,.55);font-family:'Montserrat',sans-serif;font-size:.58rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;background:0 0;cursor:pointer;transition:all .25s}
.sp-btn:hover{color:var(--wh);border-color:var(--wh)}.sp-btn.fb:hover{border-color:#1877f2;color:#1877f2}.sp-btn.li:hover{border-color:#0a66c2;color:#0a66c2}.sp-btn.ig:hover{border-color:#e1306c;color:#e1306c}
.sp-btn svg{width:14px;height:14px}.sp-btn.fb svg,.sp-btn.li svg{fill:currentColor}.sp-btn.ig svg{fill:none;stroke:currentColor;stroke-width:2}
.sp-msg{font-size:.65rem;color:rgba(248,245,240,.3);font-style:italic;line-height:1.5;padding:.8rem 0 0}
.sp-close{position:absolute;top:1.2rem;right:1.8rem;background:0 0;border:none;color:rgba(248,245,240,.35);font-size:1.2rem;cursor:pointer;line-height:1;padding:.2rem}.sp-close:hover{color:var(--wh)}

#slides{display:flex;flex-direction:column}
.sl{position:relative;width:100%;padding-bottom:56.25%;overflow:hidden;background:#080808}
.sl-inner{position:absolute;inset:0}
/* Cover */
.cover .bg,.closing .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover .bg{filter:brightness(.38) saturate(1.1)}
.cover .vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,.7) 100%)}
.cover .card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;padding:2.5rem 4.5rem;background:rgba(8,8,8,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(248,245,240,.1);min-width:340px;max-width:80%}
.cover .ey{font-size:.48rem;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);font-weight:400;margin-bottom:1rem}
.cover h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,3.2rem);font-weight:300;font-style:italic;line-height:1.1;margin-bottom:.6rem}
.cover .desc{font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(248,245,240,.4);font-weight:300}
.cover .lm{position:absolute;bottom:1.4rem;left:1.8rem;display:flex;align-items:center;gap:.5rem}
.cover .lm img{width:22px;height:22px;opacity:.65}
.cover .lm span{font-size:.45rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(248,245,240,.38)}.cover .lm b{font-weight:600}

.gi{background-size:cover;background-position:center}
.g2{display:grid;grid-template-columns:60% 40%;grid-template-rows:1fr;gap:2px}
.g2r{display:grid;grid-template-rows:1fr 1fr;gap:2px;height:100%}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}
.g4{display:grid;grid-template-rows:60% 40%;gap:2px}
.g4b{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:100%}
.g5{display:grid;grid-template-columns:40% 60%;gap:2px}
.g5l{display:grid;grid-template-rows:1fr 1fr;gap:2px;height:100%}
/* Quote */
.qo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;padding:2rem 3.2rem;background:rgba(8,8,8,.8);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-left:3px solid var(--gold);max-width:55%;pointer-events:none}

.closing h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,3.2vw,2.5rem);font-weight:300;font-style:italic;line-height:1.35;color:#fff;max-width:540px;margin-bottom:.7rem}
.closing .sub{font-size:.68rem;font-weight:300;color:rgba(255,255,255,.55);letter-spacing:.1em;margin-bottom:.7rem;line-height:1.7}
.closing .url{font-size:.45rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:2.5rem}
.closing .brand{display:flex;align-items:center;justify-content:center;gap:.7rem}
.closing .brand img{width:38px;height:38px;opacity:.8}
.closing .bt{font-size:.75rem;letter-spacing:.28em;text-transform:uppercase;font-weight:300;color:rgba(255,255,255,.8)}.closing .bt b{font-weight:600}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--wh);color:var(--bk);font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.15em;padding:.75rem 2rem;z-index:300;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}

// ── TAG SCORING ───────────────────────────────────────────
var AXIS_MAP={
  horizon:  {left:'solitude',right:'social'},
  rhythm:   {left:'slow',right:'active'},
  comfort:  {left:'polished',right:'raw'},
  landscape:{left:'warm',right:'cold'},
  setting:  {left:'nature',right:'culture'},
  spirit:   {left:'wildlife',right:'human'},
  cultural: {left:'ancient',right:'modern'},
  connection:{left:'intimate',right:'thrill'},
  growth:   {left:'play',right:'learning'},
  narrative:{left:'heritage',right:'newways'},
  awakening:{left:'rest',right:'grit'}
};

function getTopTags(axes){
  if(!axes||!Object.keys(axes).length)return['nature','slow','warm','culture'];
  var scores={};
  Object.keys(axes).forEach(function(axis){
    var m=AXIS_MAP[axis];if(!m)return;
    var v=Number(axes[axis]);
    var lScore=100-v, rScore=v;
    scores[m.left]=(scores[m.left]||0)+lScore;
    scores[m.right]=(scores[m.right]||0)+rScore;
  });
  var sorted=Object.entries(scores).sort(function(a,b){return b[1]-a[1]}).map(function(e){return e[0]}).filter(function(t){return POOLS[t]});
  if(DEBUG){
    var dbgEl=document.getElementById('dbg');dbgEl.style.display='block';
    dbgEl.innerHTML='<b>AXES:</b> '+JSON.stringify(axes)+'<br><b>SCORES:</b> '+JSON.stringify(scores)+'<br><b>TOP TAGS:</b> '+sorted.slice(0,6).join(', ');
  }
  console.log('[BE Moodboard] Axes:',axes,'Top tags:',sorted.slice(0,5));
  return sorted;
}

function pickImgs(topTags,n,travType){
  var imgs=[],used={};
  (TRAV[travType]||TRAV.couple).forEach(function(u){if(imgs.length<2&&!used[u]){used[u]=1;imgs.push(u)}});
  var i=0;
  while(imgs.length<n&&i<400){
    var tag=topTags[i%topTags.length];
    var pool=POOLS[tag];
    if(pool){var idx=Math.floor(i/topTags.length)%pool.length;var p=pool[idx];if(p&&!used[p]){used[p]=1;imgs.push(p)}}
    i++;
  }
  return imgs.slice(0,n);
}

    // PATH 1: mobile with file share

      catch(e){if(e.name==='AbortError'){btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>Instagram';return}}
    }
    // PATH 2: mobile URL-only share
    if(navigator.share){
      try{await navigator.share({text:SHARE_MSG,url:SHARE_URL});btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>Instagram';return}
      catch(e){if(e.name==='AbortError'){btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>Instagram';return}}
    }
    // PATH 3: desktop — download image + copy caption
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='BlindExperiences-Moodboard.jpg';document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a)},1000);
    if(navigator.clipboard){await navigator.clipboard.writeText(SHARE_MSG)}
    showToast('Image saved \u2014 caption copied to clipboard');
  }catch(e){
    console.error(e);
    // Last resort: copy text only
    if(navigator.clipboard){await navigator.clipboard.writeText(SHARE_MSG);showToast('Caption copied to clipboard')}

  }
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>Instagram';
}

// ── PDF ───────────────────────────────────────────────────
async function dlPDF(){
  var btn=document.getElementById('dlBtn');btn.classList.add('busy');btn.textContent='Generating\u2026';
  // Preload all bg images
  var urls=[];
  document.querySelectorAll('.gi').forEach(function(el){var m=el.style.backgroundImage.match(/url\(['"]?(.*?)['"]?\)/);if(m)urls.push(m[1])});
  document.querySelectorAll('.sl img').forEach(function(img){if(img.src)urls.push(img.src)});
  await Promise.all(urls.map(function(u){return new Promise(function(res){var i=new Image();i.crossOrigin='anonymous';i.onload=res;i.onerror=res;i.src=u})}));
  await new Promise(function(r){setTimeout(r,800)});
  try{
    var jsPDF=window.jspdf.jsPDF;
    var pdf=new jsPDF('l','mm','a4');
    var pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    var slides=document.querySelectorAll('.sl');
    for(var i=0;i<slides.length;i++){
      if(i>0)pdf.addPage();
      pdf.setFillColor(8,8,8);pdf.rect(0,0,pw,ph,'F');
      var canvas=await html2canvas(slides[i],{useCORS:true,allowTaint:true,scale:2,backgroundColor:'#080808',logging:false,imageTimeout:10000});
      var ratio=canvas.width/canvas.height,pr=pw/ph;
      var iw,ih,x,y;
      if(ratio>=pr){iw=pw;ih=pw/ratio;x=0;y=(ph-ih)/2}
      else{ih=ph;iw=ph*ratio;x=(pw-iw)/2;y=0}
      pdf.addImage(canvas.toDataURL('image/jpeg',.92),'JPEG',x,y,iw,ih);
    }
    pdf.save('BlindExperiences-Moodboard.pdf');
    showToast('Moodboard saved \u2713');
  }catch(e){console.error(e);showToast('Try: right-click > Print > Save as PDF')}
  btn.classList.remove('busy');
  btn.innerHTML='<svg viewBox="0 0 24 24" style="fill:currentColor;width:12px;height:12px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Download PDF';
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3200)}
