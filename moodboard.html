<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bk:#080808;--wh:#f8f5f0;--gold:#c9a96e}
html,body{background:var(--bk);color:var(--wh);font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased}

/* UI */
.ui{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(8,8,8,.96),transparent);pointer-events:none}
.ui-brand{display:flex;align-items:center;gap:.5rem;pointer-events:all}
.ui-brand img{width:22px;height:22px;opacity:.6}
.ui-brand span{font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(248,245,240,.4)}.ui-brand b{font-weight:600;color:rgba(248,245,240,.6)}
.ui-actions{display:flex;gap:.7rem;pointer-events:all}
.ubtn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.3rem;font-family:'Montserrat',sans-serif;font-size:.55rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:all .3s;border:none;outline:none}
.ubtn.dl{background:var(--wh);color:var(--bk)}.ubtn.dl:hover{background:var(--gold);color:#fff}
.ubtn.sh{background:transparent;border:1px solid rgba(248,245,240,.18);color:rgba(248,245,240,.55)}.ubtn.sh:hover{border-color:var(--wh);color:var(--wh)}
.ubtn.busy{opacity:.4;pointer-events:none}

/* Share panel */
.spanel{position:fixed;bottom:0;left:0;right:0;z-index:201;padding:1.8rem 2rem 2.2rem;background:rgba(8,8,8,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(248,245,240,.08);transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.spanel.open{transform:translateY(0)}
.sp-title{font-size:.52rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(248,245,240,.35);margin-bottom:1.2rem}
.sp-btns{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:1rem}
.sp-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.4rem;border:1px solid rgba(248,245,240,.14);color:rgba(248,245,240,.5);font-family:'Montserrat',sans-serif;font-size:.58rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;background:0 0;cursor:pointer;transition:all .25s}
.sp-btn:hover{color:var(--wh);border-color:var(--wh)}.sp-btn.fb:hover{border-color:#1877f2;color:#1877f2}.sp-btn.li:hover{border-color:#0a66c2;color:#0a66c2}.sp-btn.ig:hover{border-color:#e1306c;color:#e1306c}
.sp-msg{font-size:.62rem;color:rgba(248,245,240,.28);font-style:italic;line-height:1.5}
.sp-close{position:absolute;top:1.2rem;right:1.8rem;background:0 0;border:none;color:rgba(248,245,240,.3);font-size:1.4rem;cursor:pointer;line-height:1}.sp-close:hover{color:var(--wh)}

/* Slides */
#slides{display:flex;flex-direction:column}

/* Every slide: 16:9 via padding-bottom trick */
.sl{position:relative;width:100%;padding-bottom:56.25%;overflow:hidden;background:#080808;flex-shrink:0}
.sli{position:absolute;inset:0;overflow:hidden}

/* Image helper: fills any cell perfectly */
.im{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}

/* Cover */
.cover .hero-img{filter:brightness(.38) saturate(1.1)}
.vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,.72) 100%);z-index:1}
.cover-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;padding:2.5rem 4.5rem;background:rgba(8,8,8,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(248,245,240,.1);min-width:320px;max-width:78%}
.cover-ey{font-size:.48rem;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);font-weight:400;margin-bottom:1rem}
.cover-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,3.2rem);font-weight:300;font-style:italic;line-height:1.1;margin-bottom:.6rem}
.cover-desc{font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(248,245,240,.4);font-weight:300}
.cover-logo{position:absolute;bottom:1.4rem;left:1.8rem;display:flex;align-items:center;gap:.5rem;z-index:2}
.cover-logo img{width:22px;height:22px;opacity:.65}
.cover-logo span{font-size:.45rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(248,245,240,.38)}.cover-logo b{font-weight:600}

/* GRID LAYOUTS
   All children of .sli grids must have position:relative so .im works */
.g2{display:grid;grid-template-columns:60% 40%;grid-template-rows:100%;height:100%;gap:2px}
.g2r{display:grid;grid-template-rows:1fr 1fr;height:100%;gap:2px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;height:100%;gap:2px}
.g4{display:grid;grid-template-rows:60% 40%;height:100%;gap:2px}
.g4b{display:grid;grid-template-columns:1fr 1fr;height:100%;gap:2px}
.g5{display:grid;grid-template-columns:40% 60%;height:100%;gap:2px}
.g5l{display:grid;grid-template-rows:1fr 1fr;height:100%;gap:2px}
/* Grid cells */
.gc{position:relative;overflow:hidden;background:#111}

/* Quote overlay */
.qo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;padding:2rem 3.2rem;background:rgba(8,8,8,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-left:3px solid var(--gold);max-width:55%;pointer-events:none}
.qo blockquote{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2vw,1.6rem);font-style:italic;font-weight:300;line-height:1.65;color:rgba(248,245,240,.94)}

/* Closing */
.closing-hero{filter:brightness(.12) saturate(.7)}
.closing-inner{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem}
.closing-h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,3.2vw,2.5rem);font-weight:300;font-style:italic;line-height:1.35;color:#fff;max-width:540px;margin-bottom:.7rem}
.closing-sub{font-size:.68rem;font-weight:300;color:rgba(255,255,255,.55);letter-spacing:.1em;margin-bottom:.7rem;line-height:1.7}
.closing-url{font-size:.45rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:2.5rem}
.closing-brand{display:flex;align-items:center;justify-content:center;gap:.7rem}
.closing-brand img{width:38px;height:38px;opacity:.8}
.closing-bt{font-size:.75rem;letter-spacing:.28em;text-transform:uppercase;font-weight:300;color:rgba(255,255,255,.8)}.closing-bt b{font-weight:600}

/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--wh);color:var(--bk);font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.15em;padding:.75rem 2rem;z-index:300;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:768px){.ui{padding:1rem}.ubtn{padding:.5rem .9rem;font-size:.5rem}.cover-card{padding:1.5rem 2rem;min-width:0}.cover-h1{font-size:clamp(1.3rem,6vw,2rem)}.qo{max-width:82%;padding:1.2rem 1.8rem}.qo blockquote{font-size:clamp(.9rem,3.5vw,1.2rem)}.closing-h2{font-size:clamp(1.2rem,5vw,1.8rem)}.sp-btns{gap:.5rem}.sp-btn{padding:.6rem 1rem;font-size:.55rem}}
</style>

  rest:    ["Rest is not idleness. It is the soul listening.","In stillness, we find what motion cannot reach."],
  grit:    ["You are stronger than the story you tell yourself.","Somewhere between comfort and dream is where life begins."]
};

var AXIS_MAP={
  horizon:{left:'solitude',right:'social'},rhythm:{left:'slow',right:'active'},
  comfort:{left:'polished',right:'raw'},landscape:{left:'warm',right:'cold'},
  setting:{left:'nature',right:'culture'},spirit:{left:'wildlife',right:'human'},
  cultural:{left:'ancient',right:'modern'},connection:{left:'intimate',right:'thrill'},
  growth:{left:'play',right:'learning'},narrative:{left:'heritage',right:'newways'},
  awakening:{left:'rest',right:'grit'}
};

function getTopTags(axes){
  if(!axes||!Object.keys(axes).length)return['nature','slow','warm'];
  var scores={};
  Object.keys(axes).forEach(function(axis){
    var m=AXIS_MAP[axis];if(!m)return;
    var v=Number(axes[axis]);
    scores[m.left]=(scores[m.left]||0)+(100-v);
    scores[m.right]=(scores[m.right]||0)+v;
  });
  var tags=Object.entries(scores).sort(function(a,b){return b[1]-a[1]}).map(function(e){return e[0]}).filter(function(t){return POOLS[t]});
  console.log('[Moodboard] Top tags:',tags.slice(0,5),'from axes:',axes);
  return tags;
}

function pickImgs(topTags,n,travType){
  var imgs=[],used={};
  (TRAV[travType]||TRAV.couple).forEach(function(u){if(imgs.length<2&&!used[u]){used[u]=1;imgs.push(u)}});
  var i=0;
  while(imgs.length<n&&i<400){
    var tag=topTags[i%topTags.length];
    var pool=POOLS[tag];
    if(pool){var idx=Math.floor(i/topTags.length)%pool.length;var p=pool[idx];if(p&&!used[p]){used[p]=1;imgs.push(p)}}
    i++;
  }
  return imgs.slice(0,n);
}

// Helpers
function img(url,cls){return '<img src="'+url+'" class="im '+(cls||'')+'" crossorigin="anonymous" alt="" loading="eager">'}
function gc(url){return '<div class="gc">'+img(url)+'</div>'}
function qo(text){return '<div class="qo"><blockquote>\u201C'+text+'\u201D</blockquote></div>'}

function mkSlide(extraClass,innerHTML){
  var d=document.createElement('div');
  d.className='sl'+(extraClass?' '+extraClass:'');
  d.innerHTML='<div class="sli">'+innerHTML+'</div>';
  return d;
}

function render(cfg){
  var name=cfg.name||'Your',tripLabel=cfg.tripLabel||'Blind Experience',expType=cfg.expType||'A Journey Without Map';
  var axes=cfg.axes||{},travType=cfg.travType||'couple';
  var topTags=getTopTags(axes);
  var tag0=topTags[0]||'nature';
  var heroUrl=HERO[tag0]||HERO.nature;
  var imgs=pickImgs(topTags,12,travType);
  var qs=QUOTES[tag0]||QUOTES.nature;
  var q1=qs[0],q2=qs[1];
  var wrap=document.getElementById('slides');wrap.innerHTML='';

  // P1: Cover
  wrap.appendChild(mkSlide('',
    img(heroUrl,'hero-img cover-hero-img')+
    '<div class="vig"></div>'+
    '<div class="cover-card">'+
      '<div class="cover-ey">Blind Experiences &nbsp;&middot;&nbsp; Private Journey</div>'+
      '<div class="cover-h1">'+name+'\u2019s<br>'+tripLabel+'</div>'+
      '<div class="cover-desc">'+expType+'</div>'+
    '</div>'+
    '<div class="cover-logo"><img src="'+LOGO+'" alt=""><span>BLIND<b>EXPERIENCES</b></span></div>'
  ));

  // Fix hero img style
  var heroEl=document.querySelector('.cover-hero-img');
  if(heroEl){Object.assign(heroEl.style,{position:'absolute',inset:'0',width:'100%',height:'100%',objectFit:'cover',filter:'brightness(.38) saturate(1.1)'})}

  // P2: 60/40 asymmetric — no text
  wrap.appendChild(mkSlide('',
    '<div class="g2">'+
      gc(imgs[0])+
      '<div class="g2r">'+gc(imgs[1])+gc(imgs[2])+'</div>'+
    '</div>'
  ));

  // P3: Three columns + quote
  wrap.appendChild(mkSlide('',
    '<div class="g3">'+gc(imgs[3])+gc(imgs[4])+gc(imgs[5])+'</div>'+qo(q1)
  ));

  // P4: Full-width top + two below — no text
  wrap.appendChild(mkSlide('',
    '<div class="g4">'+
      '<div class="gc">'+img(imgs[6])+'</div>'+
      '<div class="g4b">'+gc(imgs[7])+gc(imgs[8])+'</div>'+
    '</div>'
  ));

  // P5: Two-stack left + tall right + quote
  wrap.appendChild(mkSlide('',
    '<div class="g5">'+
      '<div class="g5l">'+gc(imgs[9])+gc(imgs[10])+'</div>'+
      gc(imgs[11])+
    '</div>'+qo(q2)
  ));

  // P6: Closing
  wrap.appendChild(mkSlide('',
    img(heroUrl,'closing-hero')+
    '<div class="closing-inner">'+
      '<div class="closing-h2">We can\u2019t wait to start planning your magical '+tripLabel+'.</div>'+
      '<div class="closing-sub">We are ready when you are.</div>'+
      '<div class="closing-url">blindexperiences.github.io/blind-experience</div>'+
      '<div class="closing-brand"><img src="'+LOGO+'" alt=""><div class="closing-bt">BLIND<b>EXPERIENCES</b></div></div>'+
    '</div>'
  ));

  // Apply cover-hero and closing-hero styles via CSS class (already in <style>)
}

async function doIG(){
  closeShare();
  var btn=document.getElementById('igBtn');btn.textContent='Preparing\u2026';
  try{
    var slide=document.querySelector('.sl');
    await new Promise(function(r){setTimeout(r,500)});
    var canvas=await html2canvas(slide,{useCORS:true,allowTaint:true,scale:2,backgroundColor:'#080808',logging:false,imageTimeout:10000});
    var blob=await new Promise(function(res){canvas.toBlob(res,'image/jpeg',0.92)});
    var file=new File([blob],'BlindExperiences-Moodboard.jpg',{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],text:SHARE_MSG,url:SHARE_URL});btn.textContent='Instagram';return}catch(e){if(e.name==='AbortError'){btn.textContent='Instagram';return}}
    }
    if(navigator.share){
      try{await navigator.share({text:SHARE_MSG,url:SHARE_URL});btn.textContent='Instagram';return}catch(e){if(e.name==='AbortError'){btn.textContent='Instagram';return}}
    }
    // Desktop: download + copy
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='BlindExperiences-Moodboard.jpg';document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a)},1000);
    if(navigator.clipboard){await navigator.clipboard.writeText(SHARE_MSG)}
    showToast('Image saved \u2014 caption copied to clipboard');
  }catch(e){
    console.error(e);
    if(navigator.clipboard){await navigator.clipboard.writeText(SHARE_MSG);showToast('Caption copied to clipboard')}
    else{showToast('Screenshot the moodboard and share on Instagram')}
  }
  btn.textContent='Instagram';
}

// PDF
async function dlPDF(){
  var btn=document.getElementById('dlBtn');btn.classList.add('busy');btn.textContent='Generating\u2026';
  // Wait for all images
  var allImgs=document.querySelectorAll('.sl img');
  await Promise.all(Array.from(allImgs).map(function(im){return im.complete?Promise.resolve():new Promise(function(r){im.onload=r;im.onerror=r})}));
  await new Promise(function(r){setTimeout(r,800)});
  try{
    var jsPDF=window.jspdf.jsPDF;
    var pdf=new jsPDF('l','mm','a4');
    var pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    var slides=document.querySelectorAll('.sl');
    for(var i=0;i<slides.length;i++){
      if(i>0)pdf.addPage();
      pdf.setFillColor(8,8,8);pdf.rect(0,0,pw,ph,'F');
      var canvas=await html2canvas(slides[i],{useCORS:true,allowTaint:true,scale:2,backgroundColor:'#080808',logging:false,imageTimeout:12000});
      var ratio=canvas.width/canvas.height,pr=pw/ph;
      var iw,ih,x,y;
      if(ratio>=pr){iw=pw;ih=pw/ratio;x=0;y=(ph-ih)/2}else{ih=ph;iw=ph*ratio;x=(pw-iw)/2;y=0}
      pdf.addImage(canvas.toDataURL('image/jpeg',.92),'JPEG',x,y,iw,ih);
    }
    pdf.save('BlindExperiences-Moodboard.pdf');
    showToast('PDF saved \u2713');
  }catch(e){console.error(e);showToast('Try: right-click > Print > Save as PDF')}
  btn.classList.remove('busy');btn.textContent='Download PDF';
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3200)}
